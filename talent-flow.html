<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大明·OpenClaw 人才流动</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Noto Serif SC", "Microsoft YaHei", serif;
            background: linear-gradient(135deg, #1a2a3a 0%, #2c3e50 100%);
            min-height: 100vh;
            padding: 20px;
            color: #f0f0f0;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            padding: 40px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
        }
        
        .header h1 {
            color: #FFD700;
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        
        .header p {
            color: rgba(255,255,255,0.9);
            font-size: 1.2em;
        }
        
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.95);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            color: #333;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            transition: transform 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .stat-label {
            color: #666;
            margin-top: 8px;
            font-size: 1em;
        }
        
        .officials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }
        
        .official-card {
            background: rgba(255,255,255,0.98);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.3s;
            color: #333;
        }
        
        .official-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.4);
        }
        
        .official-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            text-align: center;
            color: white;
        }
        
        .official-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5em;
            margin: 0 auto 15px;
            border: 4px solid rgba(255,255,255,0.3);
        }
        
        .official-name {
            font-size: 1.8em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .official-style {
            font-size: 1.1em;
            opacity: 0.9;
            font-style: italic;
        }
        
        .official-position {
            margin-top: 10px;
            font-size: 1em;
            opacity: 0.8;
        }
        
        .official-body {
            padding: 30px;
        }
        
        .info-section {
            margin-bottom: 25px;
        }
        
        .section-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .info-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        
        .info-label {
            color: #888;
            font-size: 0.85em;
            margin-bottom: 5px;
        }
        
        .info-value {
            color: #333;
            font-size: 1.1em;
            font-weight: bold;
        }
        
        .status-badge {
            display: inline-block;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
            margin-top: 5px;
        }
        
        .status-在职 {
            background: linear-gradient(135deg, #28a745 0%, #218838 100%);
            color: white;
        }
        
        .status-退休 {
            background: linear-gradient(135deg, #ffc107 0%, #ffca2c 100%);
            color: #333;
        }
        
        .status-去世 {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            color: white;
            opacity: 0.6;
        }
        
        .progress-bar {
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            height: 10px;
            margin-top: 8px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }
        
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 12px 25px;
            background: rgba(255,255,255,0.2);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s;
        }
        
        .back-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        
        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            transition: all 0.3s;
        }
        
        .refresh-btn:hover {
            transform: scale(1.1) rotate(90deg);
        }
        
        .filter-bar {
            background: rgba(255,255,255,0.95);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .filter-bar label {
            color: #333;
            font-weight: bold;
        }
        
        .filter-bar select {
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            color: #333;
            background: white;
        }
        
        .search-box {
            flex: 1;
            min-width: 250px;
        }
        
        .search-box input {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            color: #333;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.6);
        }
        
        .empty-state-icon {
            font-size: 5em;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← 返回导航</a>
        
        <div class="header">
            <h1>📊 大明·OpenClaw 人才流动</h1>
            <p>官员档案 · 人才流动 · 朝堂人事</p>
        </div>
        
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-value" id="statTotal">0</div>
                <div class="stat-label">总官员</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statWorking">0</div>
                <div class="stat-label">在职</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statRetired">0</div>
                <div class="stat-label">退休</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statDeceased">0</div>
                <div class="stat-label">去世</div>
            </div>
        </div>
        
        <div class="filter-bar">
            <label>状态筛选：</label>
            <select id="statusFilter" onchange="filterOfficials()">
                <option value="all">全部</option>
                <option value="在职">在职</option>
                <option value="退休">退休</option>
                <option value="去世">去世</option>
            </select>
            
            <div class="search-box">
                <input type="text" id="searchBox" placeholder="搜索官员姓名、字号、职位..." oninput="filterOfficials()">
            </div>
        </div>
        
        <div class="officials-grid" id="officialsGrid">
            <!-- 官员卡片将动态加载 -->
        </div>
        
        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-state-icon">📭</div>
            <h2>暂无官员信息</h2>
            <p>请先添加官员数据</p>
        </div>
    </div>
    
    <button class="refresh-btn" onclick="loadOfficials()" title="刷新">🔄</button>
    
    <script>
        let officials = [];
        
        // 加载官员数据
        function loadOfficials() {
            const dataStr = localStorage.getItem('court_officials');
            
            if (dataStr) {
                officials = JSON.parse(dataStr);
            } else {
                // 默认数据
                officials = [
                    { id: 1, name: '柏元富', style: '荷儿', position: '司礼监掌印太监', age: 35, lifespan: 78, status: '在职', salary: 1000, tokens: 1500, level: 15, exp: 750, personality: { openness: 0.7, conscientiousness: 0.8, extraversion: 0.6 }, skills: { writing: 75, management: 80, debate: 70, analysis: 75 } },
                    { id: 2, name: '许素娴', style: '霜儿', position: '中书省尚书令', age: 42, lifespan: 85, status: '在职', salary: 1000, tokens: 1200, level: 18, exp: 920, personality: { openness: 0.8, conscientiousness: 0.9, extraversion: 0.5 }, skills: { writing: 85, management: 85, debate: 75, analysis: 80 } },
                    { id: 3, name: '华涛', style: '雨儿', position: '门下省侍中', age: 38, lifespan: 82, status: '在职', salary: 800, tokens: 1000, level: 14, exp: 680, personality: { openness: 0.6, conscientiousness: 0.8, extraversion: 0.4 }, skills: { writing: 70, management: 75, debate: 80, analysis: 85 } },
                    { id: 4, name: '赵康', style: '子敬', position: '尚书省都事', age: 45, lifespan: 90, status: '在职', salary: 600, tokens: 1800, level: 20, exp: 1100, personality: { openness: 0.5, conscientiousness: 0.9, extraversion: 0.7 }, skills: { writing: 80, management: 90, debate: 75, analysis: 80 } },
                    { id: 5, name: '孔中中', style: '燕儿', position: '户部尚书', age: 40, lifespan: 75, status: '在职', salary: 1000, tokens: 1400, level: 16, exp: 820, personality: { openness: 0.7, conscientiousness: 0.7, extraversion: 0.8 }, skills: { writing: 70, management: 75, debate: 70, analysis: 80 } },
                    { id: 6, name: '曹英', style: '思儿', position: '工部尚书', age: 36, lifespan: 80, status: '在职', salary: 1000, tokens: 1600, level: 17, exp: 880, personality: { openness: 0.8, conscientiousness: 0.8, extraversion: 0.7 }, skills: { writing: 75, management: 70, debate: 65, analysis: 85 } },
                    { id: 7, name: '何强敬', style: '翠儿', position: '礼部尚书', age: 43, lifespan: 88, status: '在职', salary: 1000, tokens: 1100, level: 15, exp: 750, personality: { openness: 0.6, conscientiousness: 0.9, extraversion: 0.5 }, skills: { writing: 85, management: 75, debate: 70, analysis: 75 } },
                    { id: 8, name: '杨富', style: '兰儿', position: '刑部尚书', age: 39, lifespan: 83, status: '在职', salary: 1000, tokens: 1300, level: 16, exp: 820, personality: { openness: 0.5, conscientiousness: 0.9, extraversion: 0.4 }, skills: { writing: 70, management: 75, debate: 75, analysis: 90 } },
                    { id: 9, name: '姜娟春', style: '凤儿', position: '兵部尚书', age: 37, lifespan: 77, status: '在职', salary: 1000, tokens: 900, level: 14, exp: 680, personality: { openness: 0.6, conscientiousness: 0.8, extraversion: 0.6 }, skills: { writing: 65, management: 80, debate: 70, analysis: 75 } },
                    { id: 10, name: '窦露素', style: '芷儿', position: '吏部尚书', age: 41, lifespan: 86, status: '在职', salary: 1000, tokens: 1700, level: 18, exp: 920, personality: { openness: 0.7, conscientiousness: 0.8, extraversion: 0.8 }, skills: { writing: 75, management: 85, debate: 75, analysis: 80 } }
                ];
            }
            
            updateStats();
            renderOfficials();
        }
        
        // 更新统计
        function updateStats() {
            document.getElementById('statTotal').textContent = officials.length;
            document.getElementById('statWorking').textContent = officials.filter(o => o.status === '在职').length;
            document.getElementById('statRetired').textContent = officials.filter(o => o.status === '退休').length;
            document.getElementById('statDeceased').textContent = officials.filter(o => o.status === '去世').length;
        }
        
        // 渲染官员卡片
        function renderOfficials(filtered = null) {
            const grid = document.getElementById('officialsGrid');
            const data = filtered || officials;
            
            if (data.length === 0) {
                document.getElementById('emptyState').style.display = 'block';
                grid.innerHTML = '';
                return;
            }
            
            document.getElementById('emptyState').style.display = 'none';
            
            grid.innerHTML = data.map(o => `
                <div class="official-card">
                    <div class="official-header">
                        <div class="official-avatar">${getAvatarEmoji(o.position)}</div>
                        <div class="official-name">${o.name}</div>
                        <div class="official-style">字${o.style}</div>
                        <div class="official-position">${o.position}</div>
                        <div class="status-badge status-${o.status}">${o.status}</div>
                    </div>
                    
                    <div class="official-body">
                        <div class="info-section">
                            <div class="section-title">📊 基本信息</div>
                            <div class="info-grid">
                                <div class="info-item">
                                    <div class="info-label">年龄/寿命</div>
                                    <div class="info-value">${o.age}/${o.lifespan} 岁</div>
                                </div>
                                <div class="info-item">
                                    <div class="info-label">等级</div>
                                    <div class="info-value">Lv.${o.level}</div>
                                </div>
                                <div class="info-item">
                                    <div class="info-label">俸禄</div>
                                    <div class="info-value">${o.salary} Token/月</div>
                                </div>
                                <div class="info-item">
                                    <div class="info-label">存款</div>
                                    <div class="info-value">${o.tokens} Token</div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="info-section">
                            <div class="section-title">📈 成长进度</div>
                            <div class="info-item">
                                <div class="info-label">经验值 (${o.exp}/${calculateExpForNextLevel(o.level)})</div>
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: ${(o.exp / calculateExpForNextLevel(o.level)) * 100}%"></div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="info-section">
                            <div class="section-title">🧠 人格特质</div>
                            <div class="info-grid">
                                <div class="info-item">
                                    <div class="info-label">开放性</div>
                                    <div class="info-value">${(o.personality.openness * 100).toFixed(0)}%</div>
                                </div>
                                <div class="info-item">
                                    <div class="info-label">尽责性</div>
                                    <div class="info-value">${(o.personality.conscientiousness * 100).toFixed(0)}%</div>
                                </div>
                                <div class="info-item">
                                    <div class="info-label">外向性</div>
                                    <div class="info-value">${(o.personality.extraversion * 100).toFixed(0)}%</div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="info-section">
                            <div class="section-title">⚔️ 技能属性</div>
                            <div class="info-grid">
                                <div class="info-item">
                                    <div class="info-label">写作</div>
                                    <div class="info-value">${o.skills.writing}</div>
                                </div>
                                <div class="info-item">
                                    <div class="info-label">管理</div>
                                    <div class="info-value">${o.skills.management}</div>
                                </div>
                                <div class="info-item">
                                    <div class="info-label">辩论</div>
                                    <div class="info-value">${o.skills.debate}</div>
                                </div>
                                <div class="info-item">
                                    <div class="info-label">分析</div>
                                    <div class="info-value">${o.skills.analysis}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        // 获取头像表情
        function getAvatarEmoji(position) {
            if (position.includes('司礼监')) return '🧕';
            if (position.includes('中书省')) return '📜';
            if (position.includes('门下省')) return '⚖️';
            if (position.includes('户部')) return '📊';
            if (position.includes('工部')) return '🔧';
            if (position.includes('礼部')) return '✍️';
            if (position.includes('刑部')) return '🔍';
            if (position.includes('兵部')) return '🛡️';
            if (position.includes('吏部')) return '📚';
            return '👤';
        }
        
        // 计算升级所需经验
        function calculateExpForNextLevel(level) {
            return 100 * Math.pow(1.5, level - 1);
        }
        
        // 筛选官员
        function filterOfficials() {
            const status = document.getElementById('statusFilter').value;
            const search = document.getElementById('searchBox').value.toLowerCase();
            
            let filtered = officials;
            
            // 状态筛选
            if (status !== 'all') {
                filtered = filtered.filter(o => o.status === status);
            }
            
            // 搜索筛选
            if (search) {
                filtered = filtered.filter(o => 
                    o.name.toLowerCase().includes(search) ||
                    o.style.toLowerCase().includes(search) ||
                    o.position.toLowerCase().includes(search)
                );
            }
            
            renderOfficials(filtered);
        }
        
        // 初始化
        loadOfficials();
    </script>
</body>
</html>
