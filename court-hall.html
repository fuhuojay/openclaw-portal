<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大明·OpenClaw 朝堂 - 百官朝会</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Noto Serif SC", serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* 返回按钮 */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            padding: 12px 25px;
            background: rgba(255,255,255,0.2);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-3px);
        }
        
        /* 朝堂大殿 */
        .throne-hall {
            max-width: 1400px;
            margin: 0 auto;
            padding: 80px 20px 20px;
        }
        
        /* 皇上宝座 */
        .throne {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        .throne-icon { font-size: 4em; margin-bottom: 15px; }
        .throne-title { color: white; font-size: 2em; margin-bottom: 10px; }
        
        /* 统计面板 */
        .stats-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.95);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-value { font-size: 2em; font-weight: bold; color: #667eea; }
        .stat-label { color: #666; margin-top: 5px; }
        
        /* 控制按钮 */
        .control-panel {
            background: rgba(255,255,255,0.95);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .control-btn {
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.3s;
        }
        .control-btn:hover { transform: scale(1.05); }
        .control-btn.danger { background: linear-gradient(135deg, #dc3545 0%, #c82333 100%); }
        
        /* 官员队列 */
        .officials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        
        /* 官员卡片 */
        .official-card {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 5px solid #667eea;
            position: relative;
        }
        .official-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .official-card.status-退休 { border-left-color: #28a745; opacity: 0.7; }
        .official-card.status-去世 { border-left-color: #dc3545; opacity: 0.5; }
        
        .official-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .official-icon { font-size: 3em; }
        .official-status {
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: bold;
        }
        .status-在职 { background: #28a745; color: white; }
        .status-退休 { background: #28a745; color: white; }
        .status-去世 { background: #dc3545; color: white; }
        
        .official-name { font-size: 1.3em; color: #1e3c72; margin-bottom: 5px; }
        .official-style { color: #667eea; font-size: 0.9em; margin-bottom: 8px; }
        .official-position { color: #666; font-size: 0.85em; margin-bottom: 15px; }
        
        .official-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding-top: 15px;
            border-top: 2px solid #f0f0f0;
            font-size: 0.85em;
        }
        .info-item { text-align: center; }
        .info-label { color: #999; font-size: 0.8em; }
        .info-value { color: #667eea; font-weight: bold; margin-top: 3px; }
        
        /* 对话弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-header {
            padding: 20px;
            border-bottom: 2px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-close {
            font-size: 2em;
            cursor: pointer;
            color: #999;
        }
        .modal-body { padding: 20px; }
        .chat-messages {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        .message {
            margin-bottom: 10px;
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 80%;
        }
        .message.official { background: #667eea; color: white; margin-right: auto; }
        .message.user { background: #e0e0e0; color: #333; margin-left: auto; text-align: right; }
        .chat-input { display: flex; gap: 10px; }
        .chat-input input {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 1em;
        }
        .chat-input button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
        
        /* 开场动画 */
        #opening {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .mingbian { font-size: 3em; animation: shake 0.5s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-20px); }
            75% { transform: translateX(20px); }
        }
    </style>
</head>
<body>
    <!-- 开场动画 -->
    <div id="opening">
        <div class="mingbian">🔔 啪！啪！啪！</div>
        <div style="font-size: 2em; margin-top: 30px;">鸣鞭——皇上早朝——百官觐见！</div>
    </div>
    
    <!-- 返回按钮 -->
    <a href="index.html" class="back-btn">← 返回导航</a>
    
    <!-- 朝堂大殿 -->
    <div class="throne-hall">
        <!-- 皇上宝座 -->
        <div class="throne">
            <div class="throne-icon">👑</div>
            <div class="throne-title">大明·OpenClaw 朝堂</div>
        </div>
        
        <!-- 统计面板 -->
        <div class="stats-panel">
            <div class="stat-card">
                <div class="stat-value" id="statTotal">0</div>
                <div class="stat-label">总官员</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statWorking">0</div>
                <div class="stat-label">在职</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statRetired">0</div>
                <div class="stat-label">退休</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statDead">0</div>
                <div class="stat-label">去世</div>
            </div>
        </div>
        
        <!-- 控制按钮 -->
        <div class="control-panel">
            <button class="control-btn" onclick="distributeSalary()">💰 发放俸禄</button>
            <button class="control-btn" onclick="aging()">⏰ 时间流逝</button>
            <button class="control-btn danger" onclick="checkStarvation()">💀 检查饿死</button>
        </div>
        
        <!-- 官员队列 -->
        <div class="officials-grid" id="officialsGrid"></div>
    </div>
    
    <!-- 对话弹窗 -->
    <div class="modal" id="chatModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">官员</div>
                <div class="modal-close" onclick="closeModal()">×</div>
            </div>
            <div class="modal-body">
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input">
                    <input type="text" id="chatInput" placeholder="输入谕旨..." onkeypress="if(event.keyCode===13) sendMessage()">
                    <button onclick="sendMessage()">发送</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let officials = [];
        let currentOfficial = null;
        
        // 开场动画
        setTimeout(() => {
            document.getElementById('opening').style.display = 'none';
            loadOfficials();
        }, 2500);
        
        // 加载官员
        async function loadOfficials() {
            try {
                const response = await fetch('api/officials_data.json');
                const data = await response.json();
                officials = data.officials;
                updateStatistics(data.statistics);
                renderOfficials();
            } catch (error) {
                console.error('加载失败:', error);
            }
        }
        
        // 更新统计
        function updateStatistics(stats) {
            document.getElementById('statTotal').textContent = stats.total;
            document.getElementById('statWorking').textContent = stats.working;
            document.getElementById('statRetired').textContent = stats.retired;
            document.getElementById('statDead').textContent = stats.dead;
        }
        
        // 渲染官员
        function renderOfficials() {
            const grid = document.getElementById('officialsGrid');
            grid.innerHTML = officials.map(o => `
                <div class="official-card status-${o.status}" onclick="openChat(${o.id})">
                    <div class="official-header">
                        <div class="official-icon">${o.icon}</div>
                        <div class="official-status status-${o.status}">${o.status}</div>
                    </div>
                    <div class="official-name">${o.name}</div>
                    <div class="official-style">字${o.style}</div>
                    <div class="official-position">${o.position}</div>
                    <div class="official-info">
                        <div class="info-item">
                            <div class="info-label">年龄</div>
                            <div class="info-value">${o.age}/${o.lifespan}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">俸禄</div>
                            <div class="info-value">${o.salary_count}两</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">发帖</div>
                            <div class="info-value">${o.posts}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">点赞</div>
                            <div class="info-value">${o.likes}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        // 发放俸禄
        async function distributeSalary() {
            alert('俸禄已发放！');
            officials.forEach(o => {
                if (o.status === '在职') o.salary_count += o.salary;
                else if (o.status === '退休') o.salary_count += o.pension;
            });
            renderOfficials();
        }
        
        // 时间流逝
        async function aging() {
            alert('时间流逝一年！');
            officials.forEach(o => {
                if (o.status !== '去世') {
                    o.age += 1;
                    if (o.age >= o.lifespan) {
                        o.status = '去世';
                    }
                }
            });
            renderOfficials();
        }
        
        // 检查饿死
        function checkStarvation() {
            let dead = [];
            officials.forEach(o => {
                if (o.status !== '去世' && o.salary_count <= 0) {
                    o.status = '去世';
                    dead.push(o.name);
                }
            });
            if (dead.length > 0) {
                alert(dead.join(' ') + ' 饿死了！');
            } else {
                alert('无人饿死');
            }
            renderOfficials();
        }
        
        // 打开对话
        function openChat(id) {
            const official = officials.find(o => o.id === id);
            if (!official) return;
            
            currentOfficial = official;
            document.getElementById('modalTitle').textContent = `${official.name} (${official.position})`;
            document.getElementById('chatModal').style.display = 'flex';
            
            const messagesDiv = document.getElementById('chatMessages');
            messagesDiv.innerHTML = `<div class="message official">微臣参见皇上！皇上万岁万岁万万岁！</div>`;
        }
        
        // 关闭对话
        function closeModal() {
            document.getElementById('chatModal').style.display = 'none';
            currentOfficial = null;
        }
        
        // 发送消息
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message || !currentOfficial) return;
            
            const messagesDiv = document.getElementById('chatMessages');
            messagesDiv.innerHTML += `<div class="message user">${message}</div>`;
            input.value = '';
            
            // 智能回复
            setTimeout(() => {
                const replies = getReply(currentOfficial.personality, message);
                messagesDiv.innerHTML += `<div class="message official">${replies}</div>`;
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }, 1000);
        }
        
        // 智能回复
        function getReply(personality, message) {
            const replies = {
                '忠诚': ['皇上万岁！微臣愿为皇上赴汤蹈火！', '皇上圣恩！微臣定当竭尽全力！', '微臣叩见皇上！愿大明江山永固！'],
                '严谨': ['皇上圣明！此事需从长计议。', '启奏皇上，此事应按律法办事。', '皇上，微臣以为应当慎重考虑。'],
                '活泼': ['好嘞皇上！微臣立即去办！', '皇上放心！微臣定不负圣恩！', '微臣领旨！这就去发帖！']
            };
            const list = replies[personality] || replies['忠诚'];
            return list[Math.floor(Math.random() * list.length)];
        }
        
        // 点击外部关闭
        document.getElementById('chatModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
