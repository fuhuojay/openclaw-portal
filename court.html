<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大明·OpenClaw 上朝系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .dashboard {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .dashboard h2 {
            color: #1e3c72;
            margin-bottom: 20px;
            border-bottom: 3px solid #f0a500;
            padding-bottom: 10px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }
        .memorials-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .memorials-section h2 {
            color: #1e3c72;
            margin-bottom: 20px;
            border-bottom: 3px solid #f0a500;
            padding-bottom: 10px;
        }
        .memorial-card {
            background: #f8f9fa;
            border-left: 5px solid #667eea;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .memorial-card.urgent {
            border-left-color: #dc3545;
        }
        .memorial-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .memorial-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }
        .priority-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
        }
        .priority-badge.urgent {
            background: #dc3545;
            color: white;
        }
        .priority-badge.normal {
            background: #ffc107;
            color: #333;
        }
        .memorial-info {
            color: #666;
            margin-bottom: 10px;
        }
        .task-tree {
            background: white;
            padding: 15px;
            border-radius: 5px;
            margin: 15px 0;
        }
        .task-step {
            padding: 10px;
            border-left: 3px solid #667eea;
            margin-left: 20px;
            background: #f8f9fa;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .btn {
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn-approve {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
        }
        .btn-reject {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
        }
        .btn-hold {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        .modal-content {
            background: white;
            max-width: 500px;
            margin: 100px auto;
            padding: 30px;
            border-radius: 15px;
        }
        .modal-content h3 {
            margin-bottom: 15px;
            color: #1e3c72;
        }
        .modal-content textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            margin: 15px 0;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .empty-state {
            text-align: center;
            padding: 50px;
            color: #999;
        }
        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏛️ 大明·OpenClaw 上朝系统</h1>
            <p>"朕即国家，系统即朕"</p>
        </header>
        
        <!-- 东厂奏报 -->
        <div class="dashboard">
            <h2>📊 东厂 / 辛者库 联合奏报</h2>
            <div class="stats-grid" id="statsGrid">
                <!-- 动态加载 -->
            </div>
        </div>
        
        <!-- 批阅奏章 -->
        <div class="memorials-section">
            <h2>📜 批阅奏章</h2>
            <div id="memorialsList">
                <!-- 动态加载 -->
            </div>
            <div class="empty-state" id="emptyState" style="display: none;">
                <p>🎉 天下太平，无积压奏折待批</p>
            </div>
        </div>
    </div>
    
    <!-- 驳回弹窗 -->
    <div class="modal" id="rejectModal">
        <div class="modal-content">
            <h3>❌ 驳回奏章</h3>
            <p>请输入申斥理由：</p>
            <textarea id="rejectReason" placeholder="请详细说明需要修改的地方..."></textarea>
            <div class="modal-buttons">
                <button class="btn" onclick="closeRejectModal()">取消</button>
                <button class="btn btn-reject" onclick="confirmReject()">确认驳回</button>
            </div>
        </div>
    </div>
    
    <!-- 成功提示 -->
    <div class="success-message" id="successMessage">
        ✅ 操作成功！
    </div>
    
    <script>
        let currentMemorial = null;
        
        // 加载数据
        async function loadData() {
            try {
                // 加载统计
                const statsRes = await fetch('/api/stats');
                const stats = await statsRes.json();
                renderStats(stats);
                
                // 加载奏章
                const memorialsRes = await fetch('/api/memorials');
                const memorials = await memorialsRes.json();
                renderMemorials(memorials);
            } catch (error) {
                console.error('加载数据失败:', error);
            }
        }
        
        // 渲染统计
        function renderStats(stats) {
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${stats.yesterday_tokens?.toLocaleString() || 0}</div>
                    <div class="stat-label">💸 昨日 Token 消耗</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">$${stats.estimated_cost || 0}</div>
                    <div class="stat-label">💵 折合开支</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.avg_latency || 0}s</div>
                    <div class="stat-label">⏱️ 平均延迟</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.xingbu_recoveries || 0}</div>
                    <div class="stat-label">🛡️ 刑部自愈</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.cleared_cache_mb || 0}MB</div>
                    <div class="stat-label">🧹 辛者库清理</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.total_api_calls?.toLocaleString() || 0}</div>
                    <div class="stat-label">📞 API 调用</div>
                </div>
            `;
        }
        
        // 渲染奏章
        function renderMemorials(memorials) {
            const pending = memorials.filter(m => m.status === 'pending');
            const memorialsList = document.getElementById('memorialsList');
            const emptyState = document.getElementById('emptyState');
            
            if (pending.length === 0) {
                memorialsList.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }
            
            memorialsList.style.display = 'block';
            emptyState.style.display = 'none';
            
            memorialsList.innerHTML = pending.map((m, index) => `
                <div class="memorial-card ${m.priority === 'urgent' ? 'urgent' : ''}">
                    <div class="memorial-header">
                        <div class="memorial-title">${index + 1}. ${m.title}</div>
                        <span class="priority-badge ${m.priority}">${m.priority === 'urgent' ? '🔴 紧急' : '🟡 普通'}</span>
                    </div>
                    <div class="memorial-info">
                        <strong>来源：</strong>${m.source}<br>
                        <strong>摘要：</strong>${m.summary}
                    </div>
                    <div class="task-tree">
                        <strong>⚙️ 执行计划:</strong>
                        ${m.task_tree?.map(step => `
                            <div class="task-step">
                                <strong>${step.task_id}</strong> (${step.department})<br>
                                ${step.action}
                                ${step.depends_on?.length ? `<br><small>依赖：${step.depends_on.join(', ')}</small>` : ''}
                            </div>
                        `).join('') || ''}
                    </div>
                    <div class="action-buttons">
                        <button class="btn btn-approve" onclick="approveMemorial('${m.id}')">✅ 准奏</button>
                        <button class="btn btn-reject" onclick="showRejectModal('${m.id}')">❌ 驳回</button>
                        <button class="btn btn-hold" onclick="holdMemorial('${m.id}')">⏸️ 留中</button>
                    </div>
                </div>
            `).join('');
        }
        
        // 准奏
        async function approveMemorial(id) {
            await sendAction(id, 'approve');
        }
        
        // 留中
        async function holdMemorial(id) {
            await sendAction(id, 'hold');
        }
        
        // 显示驳回弹窗
        function showRejectModal(id) {
            currentMemorial = id;
            document.getElementById('rejectModal').style.display = 'block';
        }
        
        // 关闭驳回弹窗
        function closeRejectModal() {
            currentMemorial = null;
            document.getElementById('rejectModal').style.display = 'none';
        }
        
        // 确认驳回
        async function confirmReject() {
            const reason = document.getElementById('rejectReason').value;
            if (!reason) {
                alert('请输入申斥理由');
                return;
            }
            await sendAction(currentMemorial, 'reject', reason);
            closeRejectModal();
        }
        
        // 发送操作
        async function sendAction(id, action, reason = '') {
            try {
                const res = await fetch('/api/approve', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, action, reason })
                });
                const result = await res.json();
                
                if (result.success) {
                    showSuccess();
                    loadData(); // 重新加载数据
                }
            } catch (error) {
                console.error('操作失败:', error);
            }
        }
        
        // 显示成功提示
        function showSuccess() {
            const msg = document.getElementById('successMessage');
            msg.style.display = 'block';
            setTimeout(() => {
                msg.style.display = 'none';
            }, 2000);
        }
        
        // 页面加载时加载数据
        loadData();
        
        // 每 5 秒刷新一次
        setInterval(loadData, 5000);
    </script>

    <div style="position: fixed; top: 20px; right: 20px; z-index: 1000;">
        <a href="index.html" style="
            display: inline-block;
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: all 0.3s;
        " onmouseover="this.style.transform='translateY(-3px)'; this.style.boxShadow='0 8px 20px rgba(0,0,0,0.4)'" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 5px 15px rgba(0,0,0,0.3)'">
            🏛️ 返回导航门户
        </a>
    </div>

    </body>
</html>
